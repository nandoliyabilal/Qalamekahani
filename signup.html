<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Qalamekahani</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Create an account</h1>
                <p class="auth-subtitle">Already have an account? <a href="login.html">Login</a></p>
            </div>

            <div id="error-msg"></div>

            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <input type="text" id="name" class="form-control" required placeholder="Full name">
                </div>

                <div class="form-group">
                    <input type="email" id="email" class="form-control" required placeholder="Email address">
                </div>

                <div class="form-group password-wrapper">
                    <input type="password" id="password" class="form-control" required placeholder="Password">
                    <i class="far fa-eye-slash toggle-password" onclick="togglePass()"></i>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn" style="margin-top:20px;">Continue</button>
            </form>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <button type="button" class="btn-social-long" id="google-signup-btn">
                <i class="fab fa-google"></i> Sign up with Google
            </button>

            <p class="terms-text" style="margin-top: 20px;">
                By clicking create account you agree to Qalamekahani's<br>
                <a href="#">Terms of use</a> and <a href="#">Privacy policy</a>
            </p>
        </div>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        const CLIENT_ID = '460935650713-6jjjvl3i6e497800a3k1as9iqprrrjqj.apps.googleusercontent.com';
        const REDIRECT_URI = window.location.origin + '/auth-callback.html';

        document.getElementById('google-signup-btn').addEventListener('click', () => {
             const nonce = Math.random().toString(36).substring(2);
             const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=id_token&scope=openid%20email%20profile&nonce=${nonce}`;
             window.location.href = authUrl;
        });

        const signupForm = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const originalBtnText = submitBtn.innerText;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (password.length < 6) {
                errorMsg.innerText = 'Password must be at least 6 characters';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.innerText = 'Creating account...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('emailForVerification', email);
                    window.location.href = 'otp-verify.html';
                } else {
                    errorMsg.innerText = data.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                    submitBtn.innerText = originalBtnText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
