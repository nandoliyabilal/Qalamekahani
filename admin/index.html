<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Qalamekahani</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            font-family: 'Poppins', sans-serif;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            z-index: 1;
        }

        .login-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 50px 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 10;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37, #aa771c);
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #ebd076, #bf953f);
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }

        .footer-text {
            margin-top: 30px;
            color: #555;
            font-size: 0.8rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="background-glow"></div>
    <div class="login-card">
        <h1 class="logo">Qalamekahani</h1>
        <p class="subtitle">Admin Portal Access</p>

        <form id="loginForm">
            <div id="errorMessage" class="error-message">
                Invalid credentials
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="admin@example.com" required>
            </div>

            <div class="form-group" id="password-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-group" id="otp-group" style="display:none; animation: fadeIn 0.5s;">
                <label class="form-label">Enter OTP</label>
                <input type="text" id="otp" class="form-input" placeholder="Enter 6-digit OTP code">
                <p style="font-size:0.75rem; color:#888; margin-top:5px;">Check your email for the code.</p>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                LOGIN
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 Qalamekahani. All rights reserved.
        </div>
    </div>

    <!-- We keep the same JS logic but removing Tailwind dependency -->
    <script>
        const API_URL = '/api';
        let step = 1;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const otp = document.getElementById('otp').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            // Loading
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="loader"></span>';
            btn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                if (step === 1) {
                    // Step 1: Initiate Login (Check Creds & Send OTP)
                    const response = await fetch(`${API_URL}/auth/admin-login-init`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Move to Step 2
                        step = 2;
                        document.getElementById('password-group').style.display = 'none';
                        document.getElementById('otp-group').style.display = 'block';
                        document.getElementById('password').required = false;
                        document.getElementById('otp').required = true;

                        btn.innerText = 'VERIFY OTP';
                        btn.disabled = false;
                        // Focus OTP
                        document.getElementById('otp').focus();
                    } else {
                        throw new Error(data.message || 'Login failed');
                    }
                } else {
                    // Step 2: Verify OTP
                    const response = await fetch(`${API_URL}/auth/admin-login-verify`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, otp })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('adminToken', data.token);
                        localStorage.setItem('adminUser', JSON.stringify({
                            name: data.name,
                            email: data.email,
                            role: data.role
                        }));
                        window.location.href = 'dashboard.html';
                    } else {
                        throw new Error(data.message || 'Verification failed');
                    }
                }

            } catch (error) {
                console.error(error);
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
                btn.innerText = step === 1 ? 'LOGIN' : 'VERIFY OTP';
                btn.disabled = false;
            }
        });

        // Check if already logged in
        const token = localStorage.getItem('adminToken');
        if (token) {
            // Optional: Validate token
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
