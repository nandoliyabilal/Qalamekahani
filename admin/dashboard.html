<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - QalamVerse Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/admin/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"
        class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-50 h-screen w-64 bg-gray-800 border-r border-gray-700 transition-transform duration-300 transform -translate-x-full lg:translate-x-0">
        <div class="h-16 flex items-center justify-between px-6 border-b border-gray-700">
            <span
                class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">QalamVerse</span>
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">
                <i data-lucide="x"></i>
            </button>
        </div>

        <nav class="p-4 space-y-1 overflow-y-auto h-[calc(100vh-4rem)]">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg bg-indigo-600 text-white shadow-lg shadow-indigo-500/20">
                <i data-lucide="layout-dashboard"></i>
                Dashboard
            </a>
            <a href="stories.html"
                class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="book-open"></i>
                Stories
            </a>
            <a href="books.html"
                class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="library"></i>
                Books
            </a>
            <a href="audio.html"
                class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="headphones"></i>
                Audio Stories
            </a>
            <a href="blogs.html"
                class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="file-text"></i>
                Users
            </a>
            <a href="reviews.html"
                class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="star"></i>
                Reviews
            </a>
            <a href="settings.html"
                class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="settings"></i>
                Settings
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="lg:pl-64 min-h-screen flex flex-col">
        <!-- Header -->
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 lg:px-8">
            <button onclick="toggleSidebar()"
                class="lg:hidden p-2 text-gray-400 hover:text-white rounded-lg hover:bg-gray-700">
                <i data-lucide="menu"></i>
            </button>

            <div class="flex items-center gap-4 ml-auto">
                <div class="flex items-center gap-3">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Admin"
                        class="w-8 h-8 rounded-full ring-2 ring-gray-700">
                    <span id="adminName" class="hidden md:block text-sm font-medium text-gray-200">Admin</span>
                </div>
                <button onclick="logout()" class="p-2 text-gray-400 hover:text-red-400 transition-colors"
                    title="Logout">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </header>

        <!-- Content -->
        <div class="p-4 lg:p-8 flex-1 overflow-y-auto">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white">Dashboard Overview</h1>
                <p class="text-gray-400">Welcome back! Here's what's happening today.</p>
            </div>

            <!-- Stats Grid -->
            <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <!-- Loading Skeletons -->
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 animate-pulse h-32"></div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 animate-pulse h-32"></div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 animate-pulse h-32"></div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 animate-pulse h-32"></div>
            </div>

            <!-- Analytics Chart -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                    <h2 class="text-xl font-bold text-white mb-6">Content Overview</h2>
                    <div class="relative h-80 w-full">
                        <canvas id="contentChart"></canvas>
                    </div>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                    <h2 class="text-xl font-bold text-white mb-6">User Activity</h2>
                    <div class="relative h-80 w-full">
                        <canvas id="userChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Recent Activity (Placeholder) -->
            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
                <div class="p-6 border-b border-gray-700">
                    <h2 class="text-lg font-semibold text-white">System Status</h2>
                </div>
                <div class="p-6">
                    <div
                        class="flex items-center gap-3 text-green-400 bg-green-400/10 p-4 rounded-lg border border-green-400/20">
                        <i data-lucide="check-circle"></i>
                        <span>System is running normally. Backend connection established.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/admin/js/main.js"></script>
    <script src="/admin/js/dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
