<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Qalamekahani</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Reusing styles from auth pages */
        .auth-container {
            background: #111;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .auth-card {
            background: #1a1a1a;
            padding: 2.5rem;
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }

        .auth-title {
            color: #d4af37;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 1rem;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        #msg {
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .error {
            color: #ff6b6b;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">New Password</h2>
            <div id="msg"></div>
            <form id="reset-form">
                <input type="password" id="password" class="form-control" required placeholder="New Password">
                <input type="password" id="confirm-password" class="form-control" required
                    placeholder="Confirm Password">
                <button type="submit" class="btn-auth">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                msg.innerText = 'Passwords do not match';
                msg.className = 'error';
                msg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`/api/auth/resetpassword/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (res.ok) {
                    alert('Password updated! Redirecting to login...');
                    window.location.href = 'login.html';
                } else {
                    msg.innerText = data.message || 'Error occurred';
                    msg.className = 'error';
                    msg.style.display = 'block';
                }
            } catch (err) {
                msg.innerText = 'Something went wrong';
                msg.className = 'error';
                msg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
