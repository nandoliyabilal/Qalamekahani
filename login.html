<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Qalamekahani</title>
    <meta name="description" content="Login to Qalamekahani to access and enjoy a world of premium audio stories, books, and blogs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo-text">Qalamekahani</a>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Please enter your details to sign in</p>
            </div>

            <div id="error-msg"></div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="auth-extra">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="remember" style="accent-color: #d4af37;">
                        <label for="remember" style="margin: 0; cursor: pointer; font-size: 0.8rem; color: #777;">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-auth-submit">Sign In</button>

                <div class="social-divider">
                    <span>OR CONTINUE WITH</span>
                </div>

                <button type="button" id="google-login" class="btn-social-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
                    Google Account
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-switch-link">Create Account</a>
                <a href="index.html" class="guest-link">Continue as Guest</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://irtsycfpwsjxrodwpthw.supabase.co';
        
        document.getElementById('google-login').addEventListener('click', async () => {
            const redirectUrl = window.location.origin + '/auth-callback.html';
            window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectUrl)}`;
        });

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const btn = document.querySelector('.btn-auth-submit');
            const originalBtnText = btn.innerText;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading State
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userInfo', JSON.stringify(data));
                    window.location.href = 'index.html';
                } else {
                    if (data.message && data.message.includes('not verified')) {
                        localStorage.setItem('emailForVerification', email);
                        window.location.href = 'otp-verify.html';
                        return;
                    }
                    errorMsg.innerText = data.message || 'Invalid email or password';
                    errorMsg.style.display = 'block';
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
