<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Qalamekahani</title>
    <meta name="description" content="Sign up for Qalamekahani to access and enjoy a world of premium audio stories, books, and blogs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 80px 2rem;
            /* Adjusted for better visibility */
            background: radial-gradient(circle at center, #1a1a1a, #0b0b0b);
            position: relative;
        }

        .auth-card {
            background: #1a1a1a;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }

        .auth-title {
            color: #d4af37;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #fff;
            margin-bottom: 0.5rem;
            font-family: 'Poppins', sans-serif;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #d4af37;
        }

        .btn-auth {
            display: block;
            width: 100%;
            padding: 12px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .btn-auth:hover {
            background: #c5a028;
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            color: #ccc;
            font-size: 0.9rem;
        }

        .auth-link {
            color: #d4af37;
            text-decoration: none;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .btn-google:hover {
            background: #f1f1f1;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body style="overflow-y: auto;">
    <header class="header">
        <div class="nav-container">
            <a href="index.html" class="logo">Qalamekahani</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Create Account</h2>
            <div id="error-msg"></div>
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required
                        placeholder="Create a password (min 6 chars)">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" required
                        placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn-auth">Sign Up</button>
                
                <div style="display: flex; align-items: center; margin: 1.5rem 0; color: #666;">
                    <div style="flex: 1; height: 1px; background: #333;"></div>
                    <span style="padding: 0 10px; font-size: 0.8rem;">OR</span>
                    <div style="flex: 1; height: 1px; background: #333;"></div>
                </div>

                <button type="button" id="google-login" class="btn-google">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Continue with Google
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Login here</a>
            </div>
        </div>
    </div>

    <script defer>
        const SUPABASE_URL = 'https://irtsycfpwsjxrodwpthw.supabase.co';
        
        document.getElementById('google-login').addEventListener('click', async () => {
            const redirectUrl = window.location.origin + '/auth-callback.html';
            window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectUrl)}`;
        });

        const signupForm = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-msg');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const btn = document.querySelector('.btn-auth');
            const originalBtnText = btn.innerText;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                errorMsg.innerText = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.innerText = 'Password must be at least 6 characters';
                errorMsg.style.display = 'block';
                return;
            }

            // Loading State
            btn.innerText = 'Sending OTP...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Store email for OTP verification page to use
                    localStorage.setItem('emailForVerification', email);
                    // Remove alert, redirect immediately
                    window.location.href = 'otp-verify.html';
                } else {
                    errorMsg.innerText = data.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.innerText = originalBtnText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        });
    </script>
</body>

</html>
