<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Qalamekahani</title>
    <meta name="description" content="Sign up for Qalamekahani to access and enjoy a world of premium audio stories, books, and blogs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo-text">Qalamekahani</a>
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join us and start your journey</p>
            </div>

            <div id="error-msg"></div>

            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="name" class="form-control" required placeholder="John Doe">
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" required placeholder="min. 6 characters">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" class="form-control" required placeholder="••••••••">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>

                <button type="submit" class="btn-auth-submit">Sign Up</button>

                <div class="social-divider">
                    <span>OR SIGN UP WITH</span>
                </div>

                <button type="button" id="google-login" class="btn-social-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
                    Google Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-switch-link">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://irtsycfpwsjxrodwpthw.supabase.co';
        
        document.getElementById('google-login').addEventListener('click', async () => {
            const redirectUrl = window.location.origin + '/auth-callback.html';
            window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectUrl)}`;
        });

        const signupForm = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-msg');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const btn = document.querySelector('.btn-auth-submit');
            const originalBtnText = btn.innerText;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                errorMsg.innerText = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.innerText = 'Password must be at least 6 characters';
                errorMsg.style.display = 'block';
                return;
            }

            // Loading State
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Creating Account...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('emailForVerification', email);
                    window.location.href = 'otp-verify.html';
                } else {
                    errorMsg.innerText = data.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
