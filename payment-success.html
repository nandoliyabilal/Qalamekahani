<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success - Qalamekahani</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=2.2">
    <style>
        .success-wrapper {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin-top: 80px;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            font-size: 2.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin: 0 auto 25px;
            border: 1px solid rgba(46, 204, 113, 0.5);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            margin-bottom: 15px;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .order-id {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: monospace;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 30px;
        }

        .btn-home {
            background: linear-gradient(135deg, #d4af37, #aa771c);
            color: #000;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>

<body>
    <header class="header scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">Qalamekahani</a>
        </div>
    </header>

    <div class="success-wrapper">
        <div class="success-card">
            <div class="icon-box">
                <i class="fas fa-check"></i>
            </div>
            <h1>Payment Successful!</h1>
            <p>Thank you for your purchase. Your book has been added to your account, and a confirmation email has been
                sent to you.</p>
            <div>
                <span class="order-id" id="display-order-id">Order ID: #ORDER_ID</span>
            </div>
            <a href="index.html" class="btn-home">Return to Home</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            if (orderId) {
                document.getElementById('display-order-id').textContent = `Order ID: #${orderId}`;
            }
        });
    </script>
</body>

</html>
