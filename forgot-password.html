<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - QalamVerse</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 2rem;
            background: #111;
        }

        .auth-card {
            background: #1a1a1a;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }

        .auth-title {
            color: #d4af37;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 1.5rem;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        #msg {
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .success {
            color: #4cd137;
        }

        .error {
            color: #ff6b6b;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Reset Password</h2>
            <p style="color: #ccc; text-align: center; margin-bottom: 1.5rem;">Enter your email to receive a reset link.
            </p>
            <div id="msg"></div>
            <form id="forgot-form">
                <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                <button type="submit" class="btn-auth">Send Reset Link</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="login.html" style="color: #d4af37; text-decoration: none;">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.style.display = 'none';
            const email = document.getElementById('email').value;

            try {
                const res = await fetch('/api/auth/forgotpassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    msg.innerText = 'Email sent! Check your inbox (or console in dev).';
                    msg.className = 'success';
                } else {
                    msg.innerText = data.message || 'Error occurred';
                    msg.className = 'error';
                }
                msg.style.display = 'block';
            } catch (err) {
                msg.innerText = 'Something went wrong';
                msg.className = 'error';
                msg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
