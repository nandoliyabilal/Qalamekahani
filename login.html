<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Qalamekahani</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Welcome Back<br>to Qalamekahani</h1>
            </div>

            <div id="error-msg"></div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <input type="email" id="email" class="form-control" required placeholder="Email address">
                </div>

                <div class="form-group password-wrapper">
                    <input type="password" id="password" class="form-control" required placeholder="Password">
                    <i class="far fa-eye-slash toggle-password" onclick="togglePass()"></i>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">Log in</button>
            </form>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <button type="button" class="btn-social-long" id="google-login">
                <i class="fab fa-google"></i> Continue with Google
            </button>

            <div class="auth-gallery" id="auth-gallery">
                <!-- Horror book images will be loaded here -->
            </div>

            <div class="auth-footer-text">
                New to Qalamekahani? <a href="signup.html">Sign up</a>
                <a href="index.html" style="display:block; margin-top:15px; opacity:0.5; text-decoration:none; color:#fff; font-size:0.8rem;">Continue as guest</a>
            </div>
        </div>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        const SUPABASE_URL = 'https://irtsycfpwsjxrodwpthw.supabase.co';
        const redirectUrl = window.location.origin + '/auth-callback.html';

        document.getElementById('google-login').addEventListener('click', () => {
             window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectUrl)}`;
        });

        // Load 3 high-quality horror book images for gallery strip
        function loadGallery() {
            const horrorImages = [
                'https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=120&h=180&fit=crop', // Dark Forest
                'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=120&h=180&fit=crop', // Spooky Castle
                'https://images.unsplash.com/photo-1505633560063-d8247f636184?w=120&h=180&fit=crop'  // Skull Color
            ];

            const gallery = document.getElementById('auth-gallery');
            gallery.innerHTML = horrorImages.map((src, index) => `
                <img src="${src}" class="gallery-item" alt="Horror Story ${index + 1}">
            `).join('');
        }
        loadGallery();

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const originalBtnText = submitBtn.innerText;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.innerText = 'Logging in...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userInfo', JSON.stringify(data));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.innerText = data.message || 'Invalid credentials';
                    errorMsg.style.display = 'block';
                    submitBtn.innerText = originalBtnText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
