<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Qalamekahani</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 80px 2rem;
            background: radial-gradient(circle at center, #1a1a1a, #0b0b0b);
            position: relative;
        }

        .auth-card {
            background: #1a1a1a;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }

        .auth-title {
            color: #d4af37;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #fff;
            margin-bottom: 0.5rem;
            font-family: 'Poppins', sans-serif;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #d4af37;
        }

        .btn-auth {
            display: block;
            width: 100%;
            padding: 12px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .btn-auth:hover {
            background: #c5a028;
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            color: #ccc;
            font-size: 0.9rem;
        }

        .auth-link {
            color: #d4af37;
            text-decoration: none;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .btn-google:hover {
            background: #f1f1f1;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body style="overflow-y: auto;">
    <header class="header">
        <div class="nav-container">
            <a href="index.html" class="logo">Qalamekahani</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Welcome Back</h2>
            <div id="error-msg"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required
                        placeholder="Enter your password">
                    <div style="text-align: right; margin-top: 0.5rem;">
                        <a href="forgot-password.html" class="auth-link" style="font-size: 0.8rem;">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="btn-auth">Login</button>
                
                <div style="display: flex; align-items: center; margin: 1.5rem 0; color: #666;">
                    <div style="flex: 1; height: 1px; background: #333;"></div>
                    <span style="padding: 0 10px; font-size: 0.8rem;">OR</span>
                    <div style="flex: 1; height: 1px; background: #333;"></div>
                </div>

                <button type="button" id="google-login" class="btn-google">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Continue with Google
                </button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Sign Up here</a>
                <div style="margin-top: 15px;">
                    <a href="index.html" style="color: #666; text-decoration: none; font-size: 0.9rem;">Skip for now
                        (Guest Access)</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://irtsycfpwsjxrodwpthw.supabase.co';
        // Note: For full production, use the Anon Key here. 
        // For now, we will use a direct redirect approach if the key is missing or we'll handle it via callback.
        
        document.getElementById('google-login').addEventListener('click', async () => {
            // Initiate Google Login through Supabase
            // This will redirect the user to Google
            const redirectUrl = window.location.origin + '/auth-callback.html';
            window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${redirectUrl}`;
        });

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const btn = document.querySelector('.btn-auth');
            const originalBtnText = btn.innerText;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading State
            btn.innerText = 'Logging in...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Save token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userInfo', JSON.stringify(data));
                    // Redirect
                    window.location.href = 'index.html';
                } else {
                    if (data.message && data.message.includes('not verified')) {
                        // Store email for verification page
                        localStorage.setItem('emailForVerification', email);
                        window.location.href = 'otp-verify.html';
                        return;
                    }
                    errorMsg.innerText = data.message || 'Invalid email or password';
                    errorMsg.style.display = 'block';
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.innerText = originalBtnText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        });
    </script>
</body>

</html>
