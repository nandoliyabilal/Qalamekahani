<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Qalamekahani</title>
    <meta name="description" content="Login to Qalamekahani to access and enjoy a world of premium audio stories, books, and blogs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">Qalamekahani</a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Please sign in to your account</p>
            </div>

            <div id="error-msg"></div>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-container">
                        <input type="email" id="email" class="form-control" required placeholder="example@mail.com" autocomplete="email">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-container">
                        <input type="password" id="password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="form-extras">
                    <label class="checkbox-container">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Continue</button>

                <div class="divider">
                    <span>OR</span>
                </div>

                <button type="button" id="google-login" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_logo.svg\" alt=\"Google\">
                    <span>Continue with Google</span>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Create Account</a>
                <a href="index.html" class="guest-link">Continue as Guest</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://irtsycfpwsjxrodwpthw.supabase.co';
        
        document.getElementById('google-login').addEventListener('click', async () => {
            const redirectUrl = window.location.origin + '/auth-callback.html';
            window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectUrl)}`;
        });

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const originalBtnText = submitBtn.innerText;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading state
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userInfo', JSON.stringify(data));
                    window.location.href = 'index.html';
                } else {
                    if (data.message && data.message.includes('not verified')) {
                        localStorage.setItem('emailForVerification', email);
                        window.location.href = 'otp-verify.html';
                        return;
                    }
                    errorMsg.innerText = data.message || 'Authentication failed';
                    errorMsg.style.display = 'block';
                    submitBtn.innerText = originalBtnText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
