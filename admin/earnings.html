<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings - Qalamekahani Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/admin/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans antialiased">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"
        class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-50 h-screen w-64 bg-gray-800 border-r border-gray-700 transition-transform duration-300 transform -translate-x-full lg:translate-x-0">
        <div class="h-16 flex items-center justify-between px-6 border-b border-gray-700">
            <span
                class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">Qalamekahani</span>
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">
                <i data-lucide="x"></i>
            </button>
        </div>

        <nav class="p-4 space-y-1 overflow-y-auto h-[calc(100vh-4rem)]">
            <a href="dashboard.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="layout-dashboard"></i>
                Dashboard
            </a>
            <a href="stories.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="book-open"></i>
                Stories
            </a>
            <a href="books.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="library"></i>
                Books
            </a>
            <a href="audio.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="headphones"></i>
                Audio Stories
            </a>
            <a href="blogs.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="file-text"></i>
                Blogs
            </a>
            <a href="earnings.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg bg-gray-700 text-white transition-colors">
                <i data-lucide="dollar-sign"></i>
                Earnings
            </a>
            <a href="users.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="users"></i>
                Users
            </a>
            <a href="images.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="image"></i>
                Images
            </a>
            <a href="reviews.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="star"></i>
                Reviews
            </a>
            <a href="orders.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="shopping-cart"></i>
                Orders
            </a>
            <a href="settings.html"
                class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <i data-lucide="settings"></i>
                Settings
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="lg:pl-64 min-h-screen flex flex-col">
        <!-- Header -->
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 lg:px-8">
            <button onclick="toggleSidebar()"
                class="lg:hidden p-2 text-gray-400 hover:text-white rounded-lg hover:bg-gray-700">
                <i data-lucide="menu"></i>
            </button>

            <div class="flex items-center gap-4 ml-auto">
                <div class="flex items-center gap-3">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Admin"
                        class="w-8 h-8 rounded-full ring-2 ring-gray-700">
                    <span id="adminName" class="hidden md:block text-sm font-medium text-gray-200">Admin</span>
                </div>
                <button onclick="logout()" class="p-2 text-gray-400 hover:text-red-400 transition-colors"
                    title="Logout">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </header>

        <!-- Content -->
        <div class="p-4 lg:p-8 flex-1 overflow-y-auto">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-white">Item Earnings</h1>
                    <p class="text-gray-400">Detailed revenue breakdown by premium story and audio story.</p>
                </div>
            </div>

            <!-- Total Earnings Summary Card -->
            <div id="totalEarningsSum" class="mb-8"></div>

            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-400">
                        <thead class="bg-gray-700/50 text-gray-200 font-medium uppercase text-xs">
                            <tr>
                                <th class="px-6 py-4">Item Title</th>
                                <th class="px-6 py-4">Type</th>
                                <th class="px-6 py-4">Sales Count</th>
                                <th class="px-6 py-4">Total Revenue</th>
                            </tr>
                        </thead>
                        <tbody id="earningsTableBody" class="divide-y divide-gray-700 text-gray-300">
                            <tr>
                                <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                                    <div class="flex items-center justify-center gap-2">
                                        <i data-lucide="loader" class="w-4 h-4 animate-spin"></i>
                                        Loading earnings...
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/admin/js/main.js"></script>
    <script src="/admin/js/earnings.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
